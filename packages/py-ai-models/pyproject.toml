[project]
name = "py-ai-models"
version = "0.1.0"
description = "A unified interface for AI generation and embeddings using LiteLLM."
authors = [{ name = "Your Name", email = "your.email@example.com" }]
dependencies = [
    "litellm>=1.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "structlog>=24.0.0",
]
requires-python = ">=3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
managed = true
dev-dependencies = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]
