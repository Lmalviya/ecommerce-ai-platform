version: '3.8'

services:
  # 1. PostgreSQL with pgvector (Primary metadata & Relations)
  postgres:
    image: ankane/pgvector:latest
    container_name: ecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Qdrant (High-performance Vector Search for AI)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: ecom-qdrant
  #   restart: unless-stopped
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   volumes:
  #     - qdrantdata:/qdrant/storage

  # 3. Redis (Caching & Task Queue for Workers)
  # redis:
  #   image: redis:7-alpine
  #   container_name: ecom-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data

  # 4. MinIO (S3-compatible storage for Product Images)
  minio:
    image: minio/minio:latest
    container_name: ecom-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web Dashboard
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  # 5. Dev Tools API (Internal Management)
  dev-tools:
    build:
      context: ../../../
      dockerfile: apps/dev-tools/Dockerfile
    container_name: ecom-dev-tools
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - IMAGE_UPLOAD_TEMP_BUCKET=${IMAGE_UPLOAD_TEMP_BUCKET}
      - IMAGE_UPLOAD_PRODUCT_BUCKET=${IMAGE_UPLOAD_PRODUCT_BUCKET}
      - MINIO_SECURE=false
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - minio
      - postgres

volumes:
  pgdata:
  # qdrantdata:
  # redisdata:
  miniodata:
